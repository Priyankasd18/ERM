<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Notification Frequency Experiment</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    background: #faf8f3;
    color: #1a1a1a;
    line-height: 1.6;
  }
  h1 { font-weight: normal; font-size: 28px; margin-bottom: 8px; letter-spacing: -0.5px; }
  h2 { font-weight: normal; font-size: 20px; margin-top: 32px; color: #555; }
  .muted { color: #777; font-size: 14px; }
  .card { background: white; padding: 32px; border: 1px solid #e5e1d6; border-radius: 4px; margin-top: 24px; }
  label { display: block; margin: 16px 0 6px; font-size: 14px; color: #444; }
  input[type=text], input[type=number], select {
    font-family: inherit; font-size: 16px; padding: 10px 12px;
    border: 1px solid #c8c4b8; border-radius: 3px; width: 100%; background: #fdfdfa;
  }
  button {
    font-family: inherit; font-size: 16px; padding: 12px 24px;
    background: #1a1a1a; color: white; border: none; border-radius: 3px;
    cursor: pointer; margin-top: 24px; letter-spacing: 0.3px;
  }
  button:hover { background: #333; }
  button.secondary { background: white; color: #1a1a1a; border: 1px solid #1a1a1a; }

  .task-label {
    text-align: center; font-size: 12px; color: #999; text-transform: uppercase;
    letter-spacing: 2px; margin-top: 32px;
  }
  .question-text {
    font-size: 26px; text-align: center; margin: 16px 0 32px;
    line-height: 1.4; color: #1a1a1a;
  }

  /* MCQ options */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin: 0 auto; }
  .option-btn {
    background: white; border: 2px solid #c8c4b8; border-radius: 4px;
    padding: 18px 16px; font-family: inherit; font-size: 16px;
    text-align: left; cursor: pointer; color: #1a1a1a;
    transition: all 0.1s; margin: 0; line-height: 1.3;
  }
  .option-btn:hover { background: #f0ebe0; border-color: #1a1a1a; }
  .option-btn .key {
    display: inline-block; background: #f0ebe0; width: 28px; height: 28px;
    line-height: 28px; text-align: center; border-radius: 3px;
    margin-right: 12px; font-weight: bold;
    font-family: 'Courier New', monospace; font-size: 14px;
  }

  /* Drag-and-drop sort */
  .sort-container { display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto 16px; }
  .sort-item {
    background: white; border: 2px solid #c8c4b8; border-radius: 4px;
    padding: 18px 20px; font-size: 18px; cursor: grab;
    user-select: none; display: flex; align-items: center; gap: 16px;
    transition: background 0.1s, border-color 0.1s, opacity 0.1s;
  }
  .sort-item::before {
    content: "⋮⋮"; color: #c8c4b8; font-size: 18px;
    letter-spacing: -3px; flex-shrink: 0;
  }
  .sort-item:hover { border-color: #888; }
  .sort-item.dragging { opacity: 0.4; cursor: grabbing; }
  .sort-item.drag-over { background: #f0ebe0; border-color: #1a1a1a; }
  .sort-submit-wrap { text-align: center; }

  .timer {
    position: fixed; top: 16px; right: 24px;
    font-family: 'Courier New', monospace; font-size: 14px; color: #888;
    background: white; padding: 6px 12px;
    border: 1px solid #e5e1d6; border-radius: 3px; z-index: 999;
  }
  .progress { text-align: center; color: #888; font-size: 13px; margin-top: 24px; }

  /* LARGER NOTIFICATION BANNER */
  .notif {
    position: fixed; top: 20px; left: 50%;
    transform: translate(-50%, -200%);
    min-width: 480px; max-width: 640px;
    color: white; padding: 22px 28px;
    font-family: -apple-system, system-ui, sans-serif;
    border-radius: 18px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.18);
    transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    z-index: 1000; display: flex; align-items: center; gap: 18px;
  }
  .notif.show { transform: translate(-50%, 0); }
  .notif-icon {
    flex-shrink: 0; width: 56px; height: 56px;
    border-radius: 12px; background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .notif-content { flex: 1; min-width: 0; }
  .notif-title { font-weight: 700; font-size: 17px; margin-bottom: 4px; letter-spacing: 0.2px; }
  .notif-body { font-size: 18px; line-height: 1.3; opacity: 0.97; }

  .likert { display: flex; gap: 8px; justify-content: center; margin: 32px 0; }
  .likert-btn {
    flex: 1; max-width: 80px; padding: 20px 8px;
    background: white; border: 1px solid #c8c4b8; border-radius: 3px;
    cursor: pointer; font-family: inherit; font-size: 18px;
    transition: all 0.15s; margin: 0; color: #1a1a1a;
  }
  .likert-btn:hover { background: #f0ebe0; }
  .likert-btn.selected { background: #1a1a1a; color: white; }
  .likert-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: 4px; padding: 0 4px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e5e1d6; }
  th { background: #f0ebe0; font-weight: normal; }
  textarea { width: 100%; height: 200px; font-family: 'Courier New', monospace; font-size: 12px; padding: 12px; border: 1px solid #c8c4b8; }
  .small { font-size: 13px; color: #666; }

  /* ============ MOBILE LAYOUT ============ */
  @media (max-width: 600px) {
    body { padding: 20px 14px 60px; font-size: 15px; }
    h1 { font-size: 22px; }
    h2 { font-size: 17px; margin-top: 24px; }
    .card { padding: 20px; margin-top: 16px; }
    input[type=text], input[type=number], select { font-size: 16px; padding: 12px; }
    button { padding: 14px 20px; font-size: 16px; width: 100%; }
    .task-label { margin-top: 20px; font-size: 11px; letter-spacing: 1.5px; }
    .question-text { font-size: 20px; margin: 12px 0 20px; padding: 0 8px; }
    .options { grid-template-columns: 1fr; gap: 10px; max-width: none; }
    .option-btn { padding: 16px 14px; font-size: 15px; width: 100%; margin-top: 0; }
    .option-btn .key { width: 24px; height: 24px; line-height: 24px; font-size: 13px; margin-right: 10px; }
    /* Notification banner — mobile-friendly */
    .notif {
      min-width: 0;
      max-width: none;
      width: calc(100vw - 20px);
      left: 10px;
      top: 10px;
      transform: translate(0, -200%);
      padding: 14px 16px;
      gap: 12px;
      border-radius: 14px;
    }
    .notif.show { transform: translate(0, 0); }
    .notif-icon { width: 44px; height: 44px; font-size: 24px; border-radius: 10px; }
    .notif-title { font-size: 14px; margin-bottom: 2px; }
    .notif-body { font-size: 15px; }
    .timer { top: 8px; right: 10px; font-size: 12px; padding: 4px 8px; }
    .likert { gap: 6px; }
    .likert-btn { padding: 14px 4px; font-size: 16px; max-width: none; }
    .likert-labels { font-size: 11px; }
    table { font-size: 12px; }
    th, td { padding: 6px 8px; }
    textarea { font-size: 11px; }
  }
</style>

// ============ STATE ============
const state = {
  participantId: '',
  age: '', gender: '',
  order: [], orderName: '',
  currentBlock: 0,
  blockData: [],
  blockTimer: null, notifTimer: null,
  currentTask: null,
  gkPool: [], puzzlePool: [],

const ORDERS = {
  '1: 0-5-10':[0,5,10],'2: 0-10-5':[0,10,5],'3: 5-0-10':[5,0,10],
  '4: 5-10-0':[5,10,0],'5: 10-0-5':[10,0,5],'6: 10-5-0':[10,5,0],
};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ AUDIO — DISTINCT SOUNDS PER APP ============
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // iOS Safari: AudioContext starts suspended; resume on user gesture
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSeq(notes) {
  ensureAudio();
  notes.forEach(n => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = n.freq;
    osc.type = n.type || 'sine';
    const t0 = audioCtx.currentTime + n.delay;
    const peak = n.gain || 0.18;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + n.dur);
    osc.start(t0);
    osc.stop(t0 + n.dur + 0.05);
  });
}

function playSound(type) {
  switch(type) {
    case 'message': // friendly two-tone (iPhone-like)
      playSeq([
        {freq:880, dur:0.13, delay:0},
        {freq:1320, dur:0.20, delay:0.09}
      ]); break;
    case 'social': // short percussive pop (Instagram-like)
      playSeq([
        {freq:1500, dur:0.08, delay:0, gain:0.22},
        {freq:1900, dur:0.06, delay:0.05, gain:0.18}
      ]); break;
    case 'alert': // urgent low buzz (bank/security-like)
      playSeq([
        {freq:440, dur:0.18, delay:0, type:'square', gain:0.13},
        {freq:440, dur:0.18, delay:0.22, type:'square', gain:0.13},
        {freq:440, dur:0.18, delay:0.44, type:'square', gain:0.13}
      ]); break;
    case 'positive': // ascending arpeggio (Tinder match / payment)
      playSeq([
        {freq:523, dur:0.10, delay:0},
        {freq:659, dur:0.10, delay:0.09},
        {freq:784, dur:0.22, delay:0.18}
      ]); break;
    case 'bell': // bell-like resonant tone (Calendar/Gmail)
      playSeq([
        {freq:1047, dur:0.40, delay:0, type:'triangle', gain:0.18},
        {freq:1568, dur:0.30, delay:0.05, type:'triangle', gain:0.13}
      ]); break;
    case 'jingle': // playful melody (Netflix/Discord/Duolingo)
      playSeq([
        {freq:659, dur:0.10, delay:0},
        {freq:784, dur:0.10, delay:0.10},
        {freq:659, dur:0.08, delay:0.20},
        {freq:988, dur:0.22, delay:0.30}
      ]); break;
    default:
      playSound('message');
  }
}

function showNotif() {
  const n = NOTIFICATIONS[Math.floor(Math.random()*NOTIFICATIONS.length)];
  const el = document.getElementById('notif');
  el.style.background = n.bg;

  document.getElementById('notifTitle').textContent = n.title;
  document.getElementById('notifBody').textContent = n.body;
  el.classList.add('show');
  playSound(n.sound);
  setTimeout(() => el.classList.remove('show'), 2600);
}

// ============ TASK GENERATION ============
function generateMath() {
  const ops = ['+','-','×'];
  const op = ops[Math.floor(Math.random()*3)];
  let a, b, answer;
  if (op === '+') {
    a = 10 + Math.floor(Math.random()*90);
    b = 10 + Math.floor(Math.random()*90);
    answer = a + b;
  } else if (op === '-') {
    a = 30 + Math.floor(Math.random()*70);
    b = 10 + Math.floor(Math.random()*(a-10));
    answer = a - b;
  } else {
    a = 2 + Math.floor(Math.random()*11);
    b = 2 + Math.floor(Math.random()*11);
    answer = a * b;
  }
  const optSet = new Set([answer]);
  while (optSet.size < 4) {
    const offset = (Math.floor(Math.random()*9)+1) * (Math.random()<0.5?-1:1);
    const wrong = answer + offset;
    if (wrong >= 0 && wrong !== answer) optSet.add(wrong);
  }
  const opts = shuffle([...optSet]);
  return {
    type: 'mcq', category: 'math',
    q: `What is ${a} ${op} ${b}?`,
    opts: opts.map(String),
    correctIdx: opts.indexOf(answer)
  };
}

function generateSort() {
  const variants = [
    () => {
      const nums = [];
      while (nums.length < 3) {
        const n = Math.floor(Math.random()*99)+1;
        if (!nums.includes(n)) nums.push(n);
      }
      return {
        type: 'sort', category: 'sort',
        q: "Drag to sort from SMALLEST to LARGEST",
        items: nums.map(String),
        correctOrder: nums.slice().sort((x,y)=>x-y).map(String)
      };
    },
    () => {
      const nums = [];
      while (nums.length < 3) {
        const n = Math.floor(Math.random()*99)+1;
        if (!nums.includes(n)) nums.push(n);
      }
      return {
        type: 'sort', category: 'sort',
        q: "Drag to sort from LARGEST to SMALLEST",
        items: nums.map(String),
        correctOrder: nums.slice().sort((x,y)=>y-x).map(String)
      };
    },
    () => {
      const pool = ["Apple","Banana","Cherry","Date","Fig","Grape","Kiwi","Lemon","Mango","Orange","Peach","Plum","Pear","Lime","Melon"];
      const picked = [];
      while (picked.length < 3) {
        const p = pool[Math.floor(Math.random()*pool.length)];
        if (!picked.includes(p)) picked.push(p);
      }
      return {
        type: 'sort', category: 'sort',
        q: "Drag to sort ALPHABETICALLY (A → Z)",
        items: picked,
        correctOrder: picked.slice().sort()
      };
    },
    () => {
      const pool = [
        ["Grape",5],["Strawberry",12],["Lemon",50],["Apple",150],["Banana",120],
        ["Orange",130],["Pineapple",1000],["Coconut",1400],["Watermelon",9000]
      ];
      const picked = [];
      while (picked.length < 3) {
        const p = pool[Math.floor(Math.random()*pool.length)];
        if (!picked.find(x => x[0] === p[0])) picked.push(p);
      }
      return {
        type: 'sort', category: 'sort',
        q: "Drag to sort from LIGHTEST to HEAVIEST fruit",
        items: picked.map(p => p[0]),
        correctOrder: picked.slice().sort((a,b)=>a[1]-b[1]).map(p=>p[0])
      };
    }
  ];
  return variants[Math.floor(Math.random()*variants.length)]();
}

function getPuzzle() {
  if (state.puzzlePool.length === 0) state.puzzlePool = shuffle(PUZZLES);
  const p = state.puzzlePool.pop();
  return { ...p, type:'mcq', category:'puzzle' };
}

function getGK() {
  if (state.gkPool.length === 0) state.gkPool = shuffle(GK);
  const g = state.gkPool.pop();
  return { ...g, type:'mcq', category:'gk' };
}

function nextTask() {
  // Practice block (currentBlock === -1): random ad-hoc generation
  if (state.currentBlock === -1) {
    const types = ['math','puzzle','gk'];
    const t = types[Math.floor(Math.random()*types.length)];
    if (t === 'math') return generateMath();
    if (t === 'puzzle') return getPuzzle();
    return getGK();
  }
  // Main blocks: use the pre-generated balanced sequence (8 math + 8 puzzle + 8 GK)
  const seq = state.blockSequences[state.currentBlock];
  if (state.taskIdx < seq.length) {
    return seq[state.taskIdx++];
  }
  // Fallback if a participant somehow exceeds 24 tasks in 60s
  return generateMath();
}

function startDemographics() {
  const pid = document.getElementById('pid').value.trim();
  const order = document.getElementById('order').value;
  if (!pid) { alert('Enter participant name'); return; }
  state.participantId = pid;
  state.orderName = order;
  state.order = ORDERS[order];
  state.gkPool = shuffle(GK);
  state.puzzlePool = shuffle(PUZZLES);
  // Pre-generate 3 balanced blocks: each block = 8 math + 8 puzzle + 8 GK,
  // shuffled. Guarantees same task-type composition across all 3 rounds
  // so difficulty is comparable. Buffer ensures fast participants never run out.
  state.blockSequences = [];
  for (let b = 0; b < 3; b++) {
    const tasks = [];
    for (let i = 0; i < 8; i++) tasks.push(generateMath());
    for (let i = 0; i < 8; i++) tasks.push(getPuzzle());
    for (let i = 0; i < 8; i++) tasks.push(getGK());
    state.blockSequences.push(shuffle(tasks));
  }
  state.taskIdx = 0;
  renderDemographics();
}

function renderInstructions() {
  render(`
    <h1>Instructions</h1>

function startPractice() {
  ensureAudio(); // unlock audio inside user gesture (needed for iOS)
  state.currentBlock = -1;
  state.answers = [];
  state.BLOCK_DURATION = 30;
  startBlockTask(0, 'Practice round (30 seconds, no notifications)');
}

function startMainBlock() {
  state.BLOCK_DURATION = 60;
  state.taskIdx = 0; // reset pre-generated sequence pointer for this block
  const freq = state.order[state.currentBlock];
  startBlockTask(freq, `Round ${state.currentBlock+1} of 3 — 1 minute`);
}

function startBlockTask(freq, label) {
  state.blockStart = Date.now();
  state.answers = [];
  state.currentTask = nextTask();

  render(`
    <p class="muted" style="text-align:center;">${label}</p>
    <div id="taskArea"></div>
    <p class="progress" id="progress">0 answered</p>
  `);
  renderCurrentTask();

  state.acceptingAnswer = true;
  document.addEventListener('keydown', keyHandler);

  document.getElementById('timer').style.display = 'block';
  updateTimer();
  state.blockTimer = setInterval(() => {
    const remaining = state.BLOCK_DURATION - Math.floor((Date.now()-state.blockStart)/1000);
    if (remaining <= 0) endBlock();
    else updateTimer();
  }, 250);

  if (freq > 0) {
    const interval = 60000 / freq;
    setTimeout(() => {
      showNotif();
      state.notifTimer = setInterval(showNotif, interval);
    }, interval / 2);
  }
}

function renderCurrentTask() {
  const t = state.currentTask;
  const area = document.getElementById('taskArea');
  const label = ({math:'MATH', puzzle:'PUZZLE', sort:'SORT', gk:'KNOWLEDGE'})[t.category];

  if (t.type === 'mcq') {
    area.innerHTML = `
      <div class="task-label">${label}</div>
      <div class="question-text">${escapeHtml(t.q)}</div>
      <div class="options">
        ${t.opts.map((o,i) => `<button class="option-btn" onclick="submitMCQ(${i})"><span class="key">${i+1}</span>${escapeHtml(o)}</button>`).join('')}
      </div>
    `;
  } else if (t.type === 'sort') {
    state.currentSortOrder = t.items.slice();
    area.innerHTML = `
      <div class="task-label">${label}</div>
      <div class="question-text">${escapeHtml(t.q)}</div>
      <div class="sort-container" id="sortContainer"></div>
      <div class="sort-submit-wrap"><button onclick="submitSort()">Submit (or press Enter)</button></div>
    `;
    renderSortItems();
  }
}

function renderSortItems() {
  document.getElementById('sortContainer').innerHTML =
    state.currentSortOrder.map((item, i) =>
      `<div class="sort-item" draggable="true" data-pos="${i}">${escapeHtml(item)}</div>`
    ).join('');
  attachSortHandlers();
}

let dragSrcIdx = null;
function attachSortHandlers() {
  document.querySelectorAll('.sort-item').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(el.dataset.pos);
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(dragSrcIdx));
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const targetIdx = parseInt(el.dataset.pos);
      if (dragSrcIdx !== null && dragSrcIdx !== targetIdx) {
        const arr = state.currentSortOrder;
        const item = arr.splice(dragSrcIdx, 1)[0];
        arr.splice(targetIdx, 0, item);
        renderSortItems();
      }
      dragSrcIdx = null;
    });
  });
}

function submitMCQ(chosenIdx) {
  if (!state.acceptingAnswer) return;
  if (state.currentTask.type !== 'mcq') return;
  const correct = chosenIdx === state.currentTask.correctIdx;
  recordAnswer(correct);
  advanceTask();
}

function submitSort() {
  if (!state.acceptingAnswer) return;
  if (state.currentTask.type !== 'sort') return;
  const correctOrder = state.currentTask.correctOrder;
  const correct = state.currentSortOrder.length === correctOrder.length &&
    state.currentSortOrder.every((v,i) => v === correctOrder[i]);
  recordAnswer(correct);
  advanceTask();
}

function recordAnswer(correct) {
  state.answers.push({
    category: state.currentTask.category,
    correct,
    rt: Date.now() - state.blockStart,
  });
}

function advanceTask() {
  state.currentTask = nextTask();
  renderCurrentTask();
  document.getElementById('progress').textContent =
    `${state.answers.length} answered`;
}

function keyHandler(e) {
  if (!state.acceptingAnswer) return;
  if (state.currentTask?.type === 'mcq' && ['1','2','3','4'].includes(e.key)) {
    submitMCQ(parseInt(e.key) - 1);
  } else if (state.currentTask?.type === 'sort' && e.key === 'Enter') {
    submitSort();
  }
}

function updateTimer() {
  const remaining = Math.max(0, state.BLOCK_DURATION - Math.floor((Date.now()-state.blockStart)/1000));
  const m = Math.floor(remaining/60).toString().padStart(2,'0');
  const s = (remaining%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

function endBlock() {
  state.acceptingAnswer = false;
  document.removeEventListener('keydown', keyHandler);
  clearInterval(state.blockTimer);
  clearInterval(state.notifTimer);
  document.getElementById('timer').style.display = 'none';

  const total = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const wrong = total - correct;

  if (state.currentBlock === -1) {
    state.currentBlock = 0;
    render(`
      <h1>Practice complete</h1>
      <div class="card">
        <p>You answered ${total} tasks (${correct} correct).</p>
        <p>Now the real experiment begins. There are 3 rounds, each 1 minute long.</p>
        <button onclick="startMainBlock()">Begin Round 1</button>
      </div>
    `);
    return;
  }

  const freq = state.order[state.currentBlock];
  state.blockData.push({
    blockNum: state.currentBlock + 1, notifFreq: freq,
    totalAnswers: total, correctAnswers: correct, wrongAnswers: wrong,
    errorRate: total > 0 ? (wrong/total).toFixed(4) : 0,
    completionRate: total > 0 ? (correct/total).toFixed(4) : 0,
    distractionRating: null,
  });
  renderRating();
}

function renderRating() {
  render(`
    <h1>How distracted did you feel?</h1>
    <p class="muted" style="text-align:center;">Round ${state.currentBlock+1} of 3</p>
    <div class="card">
      <div class="likert">
        ${[1,2,3,4,5].map(n => `<button class="likert-btn" onclick="selectRating(${n})">${n}</button>`).join('')}
      </div>
      <div class="likert-labels">
        <span>1 — Not at all</span>
        <span>5 — Extremely</span>
      </div>
      <button id="ratingNext" onclick="advanceBlock()" disabled style="opacity:0.4;">Continue</button>
    </div>
  `);
}

function selectRating(n) {
  state.blockData[state.blockData.length-1].distractionRating = n;
  document.querySelectorAll('.likert-btn').forEach((b,i) => {
    b.classList.toggle('selected', i+1 === n);
  });
  const btn = document.getElementById('ratingNext');
  btn.disabled = false; btn.style.opacity = 1;
}

function advanceBlock() {
  state.currentBlock++;
  if (state.currentBlock >= 3) renderEnd();
  else {
    render(`
      <h1>Short break</h1>
      <div class="card">
        <p>Take a moment if you need to. When ready, continue to round ${state.currentBlock+1}.</p>
        <button onclick="startMainBlock()">Begin Round ${state.currentBlock+1}</button>
      </div>
    `);
  }
}

function renderEnd() {
  const b = state.blockData;
  const longHeader = ['Name','Age','Gender','NotificationFrequency','TotalAnswers','CorrectAnswers','WrongAnswers','ErrorRate','CompletionRate','SubjectiveDistraction'];
  const longRows = b.map(x => [state.participantId, state.age, state.gender, x.notifFreq, x.totalAnswers, x.correctAnswers, x.wrongAnswers, x.errorRate, x.completionRate, x.distractionRating]);

  const wideHeader = [
    'Name','Age','Gender','OrderName',
    'Block1_freq','Block1_total','Block1_correct','Block1_wrong','Block1_errorRate','Block1_completionRate','Block1_distraction',
    'Block2_freq','Block2_total','Block2_correct','Block2_wrong','Block2_errorRate','Block2_completionRate','Block2_distraction',
    'Block3_freq','Block3_total','Block3_correct','Block3_wrong','Block3_errorRate','Block3_completionRate','Block3_distraction',
  ];
  const wideRow = [
    state.participantId, state.age, state.gender, state.orderName,
    ...b.flatMap(x => [x.notifFreq, x.totalAnswers, x.correctAnswers, x.wrongAnswers, x.errorRate, x.completionRate, x.distractionRating])
  ];

  // Build CSV with semicolon separator (German Excel default) + decimal commas
  const wideCsv = wideHeader.map(csvCell).join(';') + '\n' + wideRow.map(csvCell).join(';');
  const longCsv = longHeader.map(csvCell).join(';') + '\n' + longRows.map(r => r.map(csvCell).join(';')).join('\n');

  // === AUTO-SAVE to localStorage (accumulates across all participants in this browser) ===
  const existing = JSON.parse(localStorage.getItem('experimentData') || '[]');
  existing.push(...longRows);
  localStorage.setItem('experimentData', JSON.stringify(existing));
  const storedCount = new Set(existing.map(r => r[0])).size;

  render(`
    <h1>Thank you</h1>
    <p>The study is complete. Please let the researcher know.</p>

    <div class="card">
      <h2 style="margin-top:0;">✓ Data saved automatically</h2>
      <p class="small">This participant's data has been added to the master file. ${storedCount} participant${storedCount===1?'':'s'} saved in this browser.</p>
      <button onclick="downloadAllData()">Download all data as CSV (opens in Excel)</button>
    </div>

    <h2>Summary for this participant</h2>
    <table>
      <tr><th>Block</th><th>Freq/min</th><th>Total</th><th>Correct</th><th>Wrong</th><th>Error rate</th><th>Distraction</th></tr>
      ${b.map(x => `<tr><td>${x.blockNum}</td><td>${x.notifFreq}</td><td>${x.totalAnswers}</td><td>${x.correctAnswers}</td><td>${x.wrongAnswers}</td><td>${x.errorRate}</td><td>${x.distractionRating}</td></tr>`).join('')}
    </table>

    <h2>This participant's data (backup, in case you want to copy manually)</h2>
    <p class="small">Long format (3 rows for JASP correlation analysis):</p>
    <textarea readonly onclick="this.select()">${longCsv}</textarea>
    <button onclick="copyText(this.previousElementSibling)">Copy long format</button>

    <p class="small" style="margin-top:24px;">Wide format (1 row):</p>
    <textarea readonly onclick="this.select()">${wideCsv}</textarea>
    <button onclick="copyText(this.previousElementSibling)">Copy wide format</button>

    <button class="secondary" onclick="location.reload()" style="margin-top:24px;">Reset for next participant</button>
  `);
}

function csvCell(val) {
  let s = String(val);
  // Convert decimal point to comma so German Excel recognizes numbers (e.g. "0.4286" -> "0,4286")
  if (/^-?\d+\.\d+$/.test(s)) s = s.replace('.', ',');
  // Quote if contains the separator, quote char, or newline
  if (s.includes(';') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadAllData() {
  const stored = JSON.parse(localStorage.getItem('experimentData') || '[]');
  if (stored.length === 0) { alert('No data saved yet'); return; }
  const header = ['Name','Age','Gender','NotificationFrequency','TotalAnswers','CorrectAnswers','WrongAnswers','ErrorRate','CompletionRate','SubjectiveDistraction'];
  // sep=; is an Excel directive that forces semicolon parsing on any locale.
  // Body uses ; separator and converts decimals "0.42" -> "0,42" for German Excel.
  const csv = 'sep=;\n' +
    header.map(csvCell).join(';') + '\n' +
    stored.map(r => r.map(csvCell).join(';')).join('\n');
  // UTF-8 BOM helps Excel detect encoding correctly
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = new Date().toISOString().slice(0,10);
  a.download = `experiment_data_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function clearAllData() {
  if (!confirm('Delete ALL saved participant data? This cannot be undone. Download first if you want a backup.')) return;
  localStorage.removeItem('experimentData');
  alert('All data cleared.');
  location.reload();
}

function copyText(ta) {
  ta.select();
  document.execCommand('copy');
  alert('Copied to clipboard');
}

renderSetup();
</script>
